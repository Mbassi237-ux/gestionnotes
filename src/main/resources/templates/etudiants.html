<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Etudiants</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="header">GESTION DES NOTES</div>

<div class="container">

<a href="/" class="btn btn-retour">Retour Accueil</a>

<h2>Liste des Etudiants</h2>

<a href="/etudiants/add" class="btn">Ajouter Etudiant</a>

<table>
<tr>
<th>#</th>
<th>Matricule</th>
<th>Nom</th>
<th>Prénom</th>
<th>Actions</th>
</tr>

<tr th:each="e, iterStat : ${etudiants}">
<td th:text="${iterStat.index + 1}"></td>
<td th:text="${e.matricule}"></td>
<td th:text="${e.nom}"></td>
<td th:text="${e.prenom}"></td>
<td>
<a th:href="@{'/etudiants/edit/' + ${e.id}}" class="btn btn-edit">Modifier</a>
<a th:href="@{'/etudiants/delete/' + ${e.id}}" class="btn btn-delete">Supprimer</a>
</td>
</tr>

</table>

</div>

</body>
</html>
