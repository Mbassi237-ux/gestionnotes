<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Ajouter / Modifier Note</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }
        .form-container {
            background-color: #ffffff;
            padding: 30px 40px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.2);
            text-align: center;
        }
        h2 {
            color: green;
            font-weight: bold;
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-top: 10px;
            font-weight: bold;
        }
        input, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            border-radius: 5px;
            border: 1px solid #ccc;
        }
        button {
            margin-top: 20px;
            padding: 10px 20px;
            background-color: green;
            color: white;
            font-weight: bold;
            border: none;
            border-radius: 5px;
            cursor: pointer;
        }
        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>
<body>
    <div class="form-container">
        <h2>Bienvenue dans l'application</h2>
        <form th:action="@{/notes/save}" th:object="${note}" method="post">
            <label for="etudiant">Étudiant :</label>
            <select id="etudiant" th:field="*{etudiant}" required>
                <option th:each="e : ${etudiants}" 
                        th:value="${e.id}" 
                        th:text="${e.nom + ' ' + e.prenom}">
                </option>
            </select>

            <label for="matiere">Matière :</label>
            <select id="matiere" th:field="*{matiere}" required>
                <option th:each="m : ${matieres}" 
                        th:value="${m.id}" 
                        th:text="${m.nom}">
                </option>
            </select>

            <label for="cc">CC (/20) :</label>
            <input type="number" id="cc" th:field="*{cc}" min="0" max="20" step="0.01" required>

            <label for="sn">SN (/40) :</label>
            <input type="number" id="sn" th:field="*{sn}" min="0" max="40" step="0.01" required>

            <label for="tp">TP (/40) :</label>
            <input type="number" id="tp" th:field="*{tp}" min="0" max="40" step="0.01" required>

            <button type="submit">Enregistrer</button>
        </form>
    </div>
</body>
</html>
