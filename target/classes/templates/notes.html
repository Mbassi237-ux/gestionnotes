<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<title>Notes</title>
<link rel="stylesheet" th:href="@{/css/style.css}">
</head>

<body>

<div class="header">
GESTION DES NOTES
</div>

<div class="container">

<a href="/" class="btn btn-retour">Retour Accueil</a>

<h2>Liste des Notes</h2>

<a href="/notes/add" class="btn">Ajouter Note</a>

<table>

<tr>
<th>ID</th>
<th>Matricule</th>
<th>Etudiant</th>
<th>Matiere</th>
<th>CC /20</th>
<th>SN /40</th>
<th>TP /40</th>
<th>Total</th>
<th>Appreciation</th>
<th>Actions</th>
</tr>

<tr th:each="note : ${notes}">

<td th:text="${note.id}"></td>

<td th:text="${note.etudiant.matricule}"></td>

<td th:text="${note.etudiant.nom + ' ' + note.etudiant.prenom}"></td>

<td th:text="${note.matiere.nom}"></td>

<td th:text="${note.cc}"></td>

<td th:text="${note.sn}"></td>

<td th:text="${note.tp}"></td>

<td th:text="${note.total}"></td>

<td th:text="${note.appreciation}"></td>

<td>

<a th:href="@{'/notes/edit/' + ${note.id}}" class="btn btn-edit">
Modifier
</a>

<a th:href="@{'/notes/delete/' + ${note.id}}" class="btn btn-delete">
Supprimer
</a>

</td>

</tr>

</table>

</div>

</body>
</html>
